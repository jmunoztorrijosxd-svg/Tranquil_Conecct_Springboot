<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tranquil Connect - Registro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* Estilos Base del Proyecto (sin cambios) */
        html, body {
            height: 100%;
            font-family: 'Inter', Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #f7f7f7;
            display: flex;
            flex-direction: column;
        }

        /* --- Estilos del Navbar (Header) --- */
        .navbar {
            background: #A0C4FF;
            color: white;
            padding: 10px 15px;
            display: flex;
            align-items: center;
        }

        .navbar .back-link {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-size: 18px;
            font-weight: 600;
        }

        .logo-container {
            display: flex;
            align-items: center;
        }
        
        .logo-text {
            font-size: 24px; 
            font-weight: bold; 
            letter-spacing: 1px;
            margin-left: 10px;
        }

        .spacer {
            flex-grow: 1;
        }

        /* --- Estilos del Formulario de Registro --- */
        .register-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .register-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .register-box h2 {
            color: #4975d4;
            margin-bottom: 25px;
            font-size: 28px;
            font-weight: 700;
        }

        /* Mensaje de Error (para la validación de correo existente o errores del controlador) */
        .error-message {
            background-color: #fce4e4;
            color: #cc0033;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: 500;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #475569;
        }

        /* Aplica el estilo tanto a input como a select */
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box; 
            font-size: 16px;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: #A0C4FF;
            outline: none;
            box-shadow: 0 0 0 3px rgba(160, 196, 255, 0.3);
        }

        .btn-register {
            width: 100%;
            padding: 12px;
            background: #4975d4;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        .btn-register:hover {
            background: #395aa8;
        }

        .links-auth {
            margin-top: 20px;
            font-size: 14px;
        }

        .links-auth a {
            color: #4975d4;
            text-decoration: none;
            font-weight: 500;
        }
        
        /* Estilos del Footer */
        .footer {
            background-color:#A0C4FF;
            text-align: center;
            color: white;
            padding: 15px;
            margin-top: auto;
        }

        .footer p {
            margin: 0;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <a th:href="@{/login}" class="back-link">
            <i class="fas fa-arrow-left"></i> Iniciar Sesión
        </a>

        <div class="spacer"></div>

        <div class="logo-container">
            <span class="logo-text">𝑻𝒓𝒂𝒏𝒒𝒖𝒊𝒍 𝑪𝒐𝒏𝒏𝒆𝒄𝒕</span>
        </div>
    </div>

    <div class="register-container">
        <div class="register-box">
            <h2>Crear Cuenta</h2>
            
            <div th:if="${error}" class="error-message">
                <p th:text="${error}"></p>
            </div>

            <form th:action="@{/registro}" method="post" th:object="${usuario}"> 
                
                <div class="input-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" th:field="*{nombre}" placeholder="Tu Nombre" required>
                </div>

                <div class="input-group">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" th:field="*{correo}" placeholder="tu.email@ejemplo.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" th:field="*{password}" placeholder="Mínimo 8 caracteres" required>
                </div>
                
                <div class="input-group">
                    <label for="telefono">Número de Teléfono</label>
                    <input type="tel" id="telefono" th:field="*{telefono}" placeholder="Ej. 555-123-4567" required>
                </div>

                <div class="input-group">
                    <label for="genero">Género</label>
                    <select id="genero" th:field="*{genero}" required>
                        <option value="" disabled selected>Selecciona tu género...</option> 
                        
                        <option value="femenino">Femenino</option>
                        <option value="masculino">Masculino</option>
                        <option value="no_binario">No Binario</option> 
                        <option value="otro">Otro</option>
                        <option value="prefiero_no_decir">Prefiero no decir</option>
                    </select>
                </div>

                <button type="submit" class="btn-register">Registrarme</button>
            </form>

            <div class="links-auth">
                <p>¿Ya tienes cuenta? <a th:href="@{/login}">Inicia Sesión aquí</a></p>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>2025 Tranquil Connect • Todos los derechos reservados</p>
    </footer>

</body>
</html>
