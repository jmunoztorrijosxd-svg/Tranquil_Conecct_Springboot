# CONFIGURACIÓN DE PUERTO (OPCIONAL, PERO ESTÁS USANDO EL 8090)
server.port=8090

# 1. CONFIGURACIÓN DE LA CONEXIÓN A LA BASE DE DATOS
# Asegúrate de que el nombre de la DB (salud_mental) y las credenciales sean correctas
spring.datasource.url=jdbc:mysql://localhost:3306/salud_mental?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# 2. CONFIGURACIÓN DE JPA/HIBERNATE
# CAMBIO CRUCIAL: 'none' evita que Hibernate intente validar o modificar el esquema al inicio, 
# saltándose el error de la tabla 'enlaces'.
spring.jpa.hibernate.ddl-auto=none
# Muestra las sentencias SQL generadas en el log
spring.jpa.show-sql=true
# Especifica el dialecto de MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect