<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tranquil Connect</title>

    <style>
        html, body {
            height: 100%;
        }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: #ccb8fc;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-btn {
            font-size: 28px;
            cursor: pointer;
            border: none;
            background: none;
            color: white;
        }

        .side-menu {
            height: 100%;
            width: 0;
            position: fixed;
            top: 0;
            left: 0;
            background: #2c3e50;
            overflow-x: hidden;
            transition: 0.4s;
            padding-top: 60px;
        }

        .side-menu a {
            padding: 12px 24px;
            display: block;
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

        .side-menu a:hover {
            background: rgba(255,255,255,0.1);
        }

        /* Contenido */
        .content {
            padding: 25px;
            text-align: center;
            flex: 1;
        }
        
        .footer {
            background-color:#ccb8fc;
            text-align: center;
            
            
        }
    </style>

    <script>
        function openMenu() {
            document.getElementById("sideMenu").style.width = "250px";
        }

        function closeMenu() {
            document.getElementById("sideMenu").style.width = "0";
        }
    </script>
</head>

<body>

    <!-- Barra superior -->
    <div class="navbar">
        <button class="menu-btn" onclick="openMenu()">&#9776;</button>
        <span style="font-size: 20px; font-weight: bold;">𝑻𝒓𝒂𝒏𝒒𝒖𝒊𝒍 𝑪𝒐𝒏𝒏𝒆𝒄𝒕</span>
        <div style="width: 95px;"></div>
    </div>

    <!-- Menú lateral -->
    <div id="sideMenu" class="side-menu">
        <a href="javascript:void(0)" onclick="closeMenu()">✖ Cerrar</a>
        <a href="#">Inicio</a>
        <a href="#">𝐆𝐫𝐮𝐩𝐨𝐬</a>
        <a href="#">𝐀𝐠𝐞𝐧𝐝𝐚𝐫</a>
        <a href="#">𝐅𝐨𝐫𝐨 𝐒𝐨𝐜𝐢𝐚𝐥</a>
        <a href="#">𝐃𝐞𝐬𝐞𝐦𝐩𝐞𝐧o</a>
    </div>

    <!-- Contenido principal -->
    <div class="content">
        <h1>Bienvenido a Tranquil Connect</h1>
        <p>Tu espacio seguro para expresarte, aprender y encontrar apoyo 🤍</p>
    </div>
    
    <footer>
        
        <p>2025 Tranquil Connect todos los derechos reservados
        
        
    </footer>

</body>
</html>
